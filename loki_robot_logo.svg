<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#0D0D0D"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>

  <!-- Robot Head -->
  <rect x="120" y="90" width="160" height="130" rx="18" fill="#1A1A2E" stroke="#00E5FF" stroke-width="2.5"/>

  <!-- Head shine -->
  <rect x="130" y="98" width="60" height="20" rx="6" fill="#ffffff" opacity="0.05"/>

  <!-- Antenna -->
  <line x1="200" y1="90" x2="200" y2="58" stroke="#00E5FF" stroke-width="3"/>
  <circle cx="200" cy="50" r="9" fill="#00E5FF"/>
  <circle cx="200" cy="50" r="5" fill="#0D0D0D"/>
  <circle cx="200" cy="50" r="2" fill="#00E5FF"/>

  <!-- Side antenna bolts -->
  <circle cx="120" cy="140" r="6" fill="#00E5FF" opacity="0.6"/>
  <circle cx="280" cy="140" r="6" fill="#00E5FF" opacity="0.6"/>

  <!-- Eyes - Left -->
  <rect x="142" y="122" width="42" height="30" rx="8" fill="#0A0A1A" stroke="#00E5FF" stroke-width="1.5"/>
  <rect x="150" y="128" width="26" height="18" rx="5" fill="#00E5FF" opacity="0.9"/>
  <rect x="154" y="131" width="8" height="8" rx="2" fill="#ffffff" opacity="0.8"/>
  <!-- Eye scan line -->
  <line x1="150" y1="137" x2="176" y2="137" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

  <!-- Eyes - Right -->
  <rect x="216" y="122" width="42" height="30" rx="8" fill="#0A0A1A" stroke="#00E5FF" stroke-width="1.5"/>
  <rect x="224" y="128" width="26" height="18" rx="5" fill="#00E5FF" opacity="0.9"/>
  <rect x="228" y="131" width="8" height="8" rx="2" fill="#ffffff" opacity="0.8"/>
  <!-- Eye scan line -->
  <line x1="224" y1="137" x2="250" y2="137" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

  <!-- Nose (data LED) -->
  <circle cx="200" cy="168" r="4" fill="#FF4081"/>

  <!-- Mouth - data bar chart style -->
  <rect x="152" y="182" width="8" height="14" rx="2" fill="#00E5FF" opacity="0.6"/>
  <rect x="164" y="176" width="8" height="20" rx="2" fill="#00E5FF" opacity="0.9"/>
  <rect x="176" y="179" width="8" height="17" rx="2" fill="#00E5FF" opacity="0.7"/>
  <rect x="188" y="173" width="8" height="23" rx="2" fill="#FF4081" opacity="0.9"/>
  <rect x="200" y="177" width="8" height="19" rx="2" fill="#00E5FF" opacity="0.8"/>
  <rect x="212" y="180" width="8" height="16" rx="2" fill="#00E5FF" opacity="0.6"/>
  <rect x="224" y="175" width="8" height="21" rx="2" fill="#00E5FF" opacity="0.9"/>
  <rect x="236" y="182" width="8" height="14" rx="2" fill="#00E5FF" opacity="0.5"/>

  <!-- Neck -->
  <rect x="180" y="220" width="40" height="18" rx="4" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Body -->
  <rect x="105" y="238" width="190" height="110" rx="16" fill="#1A1A2E" stroke="#00E5FF" stroke-width="2.5"/>

  <!-- Body chest panel -->
  <rect x="125" y="255" width="150" height="75" rx="10" fill="#0D0D0D" stroke="#00E5FF" stroke-width="1" opacity="0.8"/>

  <!-- Chest: LOKI text -->
  <text x="200" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00E5FF" letter-spacing="6">LOKI</text>

  <!-- Chest: number7 -->
  <text x="200" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="14" fill="#FF4081" letter-spacing="3">NUMBER7</text>

  <!-- Chest: mini bar chart -->
  <rect x="134" y="316" width="5" height="8" rx="1" fill="#00E5FF" opacity="0.5"/>
  <rect x="142" y="312" width="5" height="12" rx="1" fill="#00E5FF" opacity="0.7"/>
  <rect x="150" y="309" width="5" height="15" rx="1" fill="#00E5FF" opacity="0.9"/>
  <rect x="158" y="313" width="5" height="11" rx="1" fill="#FF4081" opacity="0.9"/>
  <rect x="166" y="315" width="5" height="9" rx="1" fill="#00E5FF" opacity="0.6"/>

  <!-- Arms - Left -->
  <rect x="68" y="242" width="38" height="80" rx="12" fill="#1A1A2E" stroke="#00E5FF" stroke-width="2"/>
  <!-- Arm joint -->
  <circle cx="87" cy="252" r="8" fill="#0D0D0D" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="87" cy="252" r="3" fill="#00E5FF"/>
  <!-- Hand left -->
  <rect x="72" y="314" width="30" height="22" rx="8" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Arms - Right -->
  <rect x="294" y="242" width="38" height="80" rx="12" fill="#1A1A2E" stroke="#00E5FF" stroke-width="2"/>
  <!-- Arm joint -->
  <circle cx="313" cy="252" r="8" fill="#0D0D0D" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="313" cy="252" r="3" fill="#00E5FF"/>
  <!-- Hand right -->
  <rect x="298" y="314" width="30" height="22" rx="8" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Legs -->
  <rect x="138" y="348" width="45" height="28" rx="8" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>
  <rect x="217" y="348" width="45" height="28" rx="8" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Feet -->
  <rect x="130" y="368" width="55" height="16" rx="6" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>
  <rect x="215" y="368" width="55" height="16" rx="6" fill="#1A1A2E" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Floating data particles -->
  <circle cx="58" cy="80" r="3" fill="#00E5FF" opacity="0.4"/>
  <circle cx="340" cy="110" r="2" fill="#FF4081" opacity="0.5"/>
  <circle cx="45" cy="200" r="2" fill="#00E5FF" opacity="0.3"/>
  <circle cx="355" cy="180" r="3" fill="#00E5FF" opacity="0.4"/>
  <circle cx="70" cy="320" r="2" fill="#FF4081" opacity="0.3"/>
  <circle cx="330" cy="330" r="2" fill="#00E5FF" opacity="0.4"/>
  <circle cx="100" cy="60" r="2" fill="#00E5FF" opacity="0.3"/>
  <circle cx="310" cy="55" r="3" fill="#FF4081" opacity="0.3"/>

  <!-- Scan lines overlay (subtle) -->
  <rect x="0" y="0" width="400" height="400" fill="url(#scanlines)" opacity="0.03"/>

  <defs>
    <pattern id="scanlines" x="0" y="0" width="400" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="2" fill="#ffffff"/>
      <rect x="0" y="2" width="400" height="2" fill="#000000"/>
    </pattern>
  </defs>
</svg>
