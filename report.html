<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOKI 창업레이더 — 업종 창업 리포트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0d0f14;color:#e8eaf0;font-size:13px;min-height:100vh}

/* ── LANDING ── */
#vL{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;background:radial-gradient(ellipse at 50% 38%,rgba(79,124,255,.18) 0%,transparent 70%)}
.lnd{width:100%;max-width:500px;text-align:center}
.ll{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}.ll span{color:#4f7cff}
.ls{font-size:10px;color:#5a6078;letter-spacing:3px;text-transform:uppercase;margin-bottom:30px}
.lh1{font-size:22px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px;line-height:1.3}
.lp{font-size:13px;color:#8b92a8;margin-bottom:34px;line-height:1.75}
.sbox{background:#1c2030;border:1.5px solid #272d3d;border-radius:16px;padding:7px 7px 7px 18px;display:flex;align-items:center;gap:8px;transition:border-color .2s;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.sbox:focus-within{border-color:#4f7cff;box-shadow:0 4px 24px rgba(79,124,255,.15)}
.sbox select{flex:1;background:transparent;border:none;color:#e8eaf0;font-size:15px;outline:none;cursor:pointer;font-family:inherit;appearance:none;-webkit-appearance:none}
.sbox select option{background:#1c2030;color:#e8eaf0}
.sbtn{background:#4f7cff;color:#fff;border:none;padding:11px 22px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.sbtn:hover{background:#3a67ff;transform:translateY(-1px)}
.epills{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center}
.eplbl{font-size:11px;color:#5a6078}
.ep{padding:5px 15px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid #272d3d;font-size:12px;color:#8b92a8;cursor:pointer;transition:all .12s}
.ep:hover{border-color:#4f7cff;color:#e8eaf0;background:rgba(79,124,255,.08)}
.land-foot{margin-top:48px;font-size:11px;color:#3a4060;line-height:1.7}

/* ── RESULTS ── */
#vR{display:none}
.rnav{background:rgba(13,15,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid #272d3d;padding:0 28px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.rback{font-size:12px;color:#8b92a8;cursor:pointer;padding:6px 12px;border:1px solid #272d3d;border-radius:7px;background:none;font-family:inherit;transition:all .12s}
.rback:hover{color:#e8eaf0;border-color:#4f7cff}
.rnl{font-size:16px;font-weight:900;letter-spacing:-.5px}.rnl span{color:#4f7cff}
.rndiv{width:1px;height:18px;background:#272d3d}
.rnmeta{font-size:11px;color:#5a6078}
.rnsp{flex:1}
.rnind{font-size:12px;color:#8b92a8}

.rhero{background:linear-gradient(180deg,#141720 0%,#0d0f14 100%);border-bottom:1px solid #272d3d;padding:32px 28px 26px}
.rhtag{font-size:10px;color:#5a6078;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.rhtitle{font-size:28px;font-weight:900;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.rhtitle .hl{color:#4f7cff}
.rhsub{font-size:12px;color:#5a6078}
.rhbadge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.rb-pos{background:rgba(0,201,167,.1);color:#00c9a7;border-color:rgba(0,201,167,.3)}
.rb-vc{background:rgba(255,183,77,.1);color:#ffb74d;border-color:rgba(255,183,77,.3)}
.rb-dng{background:rgba(255,79,109,.1);color:#ff4f6d;border-color:rgba(255,79,109,.3)}
.rb-rev{background:rgba(79,124,255,.1);color:#8faeff;border-color:rgba(79,124,255,.3)}

.rcont{max-width:960px;margin:0 auto;padding:24px 28px 72px}

/* ── SECTION HEADER ── */
.shdr{display:flex;align-items:center;gap:10px;margin:28px 0 14px}
.sbadge{padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px}
.sb-a{background:rgba(79,124,255,.14);color:#8faeff;border:1px solid rgba(79,124,255,.25)}
.sb-b{background:rgba(0,201,167,.12);color:#00c9a7;border:1px solid rgba(0,201,167,.22)}
.sttl{font-size:15px;font-weight:700}

/* ── CARD ── */
.card{background:#181c28;border:1px solid #272d3d;border-radius:14px;padding:22px;margin-bottom:12px}
.ctitle{font-size:16px;font-weight:800;color:#e8eaf0;margin-bottom:4px}
.csub{font-size:12px;color:#5a6078;margin-bottom:16px}
.interp{margin-top:14px;padding:12px 15px;background:rgba(79,124,255,.06);border-left:3px solid rgba(79,124,255,.45);border-radius:0 7px 7px 0;font-size:12px;color:#8b92a8;line-height:1.8}
.interp b{color:#c8cfe0}

/* ── VERDICT ── */
.vcard{border-radius:12px;padding:22px;margin-bottom:2px;border:1px solid}
.vp{background:rgba(0,201,167,.07);border-color:rgba(0,201,167,.25)}
.vr{background:rgba(79,124,255,.07);border-color:rgba(79,124,255,.25)}
.vc{background:rgba(255,183,77,.07);border-color:rgba(255,183,77,.25)}
.vd{background:rgba(255,79,109,.07);border-color:rgba(255,79,109,.25)}
.vrow{display:flex;gap:20px;align-items:flex-start}
.vleft{flex:1}
.vtext{font-size:23px;font-weight:900;margin-bottom:7px;letter-spacing:-.3px}
.vp .vtext{color:#00c9a7}.vr .vtext{color:#4f7cff}.vc .vtext{color:#ffb74d}.vd .vtext{color:#ff4f6d}
.vreason{font-size:14px;color:#c8cfe0;margin-bottom:8px;font-weight:600}
.vdetail{font-size:12px;color:#8b92a8;line-height:1.75}
.vbul{list-style:none;margin-top:10px}
.vbul li{font-size:12px;color:#8b92a8;padding:3px 0}
.vbul li::before{content:'— ';color:#5a6078}
.vstats{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.vstat{background:rgba(255,255,255,.04);border:1px solid #272d3d;border-radius:10px;padding:13px 18px;text-align:center;min-width:82px}
.vnum{font-size:21px;font-weight:800;line-height:1;margin-bottom:5px}
.vlbl{font-size:10px;color:#5a6078}
.vp .vnum{color:#00c9a7}.vr .vnum{color:#4f7cff}.vc .vnum{color:#ffb74d}.vd .vnum{color:#ff4f6d}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

/* ── SURVIVAL ── */
.srow{display:flex;gap:8px;margin-bottom:12px}
.si{flex:1;background:#1c2030;border-radius:9px;padding:14px 6px;text-align:center}
.sp{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.sy{font-size:10px;color:#5a6078}
.chi{color:#00c9a7}.cmi{color:#ffb74d}.clo{color:#ff4f6d}

/* ── GAUGE ── */
.gctr{text-align:center;padding:6px 0}
.gbig{font-size:40px;font-weight:800}
.gu{font-size:14px;color:#5a6078}
.gtrk{height:8px;background:#1c2030;border-radius:999px;margin:12px 0;overflow:hidden}
.gfil{height:100%;border-radius:999px}
.gnote{font-size:12px;color:#8b92a8}

/* ── LIFECYCLE ── */
.lcstg{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:9px}
.lcg{background:rgba(0,201,167,.15);color:#00c9a7}
.lcm{background:rgba(255,183,77,.15);color:#ffb74d}
.lcd{background:rgba(255,79,109,.15);color:#ff4f6d}
.lcnote{font-size:12px;color:#8b92a8;line-height:1.65;margin-top:7px}

/* ── SIMILAR ── */
.simrow{display:flex;gap:9px}
.simi{flex:1;background:#1c2030;border:1px solid #272d3d;border-radius:10px;padding:14px 15px;display:flex;align-items:center;justify-content:space-between}
.simn{font-size:13px;font-weight:700}
.sims{font-size:11px;color:#5a6078;margin-top:2px}
.chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.cp{background:rgba(0,201,167,.15);color:#00c9a7}
.cr{background:rgba(79,124,255,.15);color:#8faeff}
.cca{background:rgba(255,183,77,.15);color:#ffb74d}
.cd{background:rgba(255,79,109,.15);color:#ff4f6d}

/* ── TOP 5 ── */
.t5row{display:flex;gap:9px;margin-bottom:12px}
.t5i{flex:1;background:#181c28;border:1px solid #272d3d;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.t5i:hover{border-color:#4f7cff;transform:translateY(-2px);box-shadow:0 4px 16px rgba(79,124,255,.15)}
.t5m{font-size:19px;margin-bottom:4px}
.t5g{font-size:12px;font-weight:700}
.t5s{font-size:10px;color:#5a6078;margin-top:3px}

/* ── DISTRICT GRID ── */
.dgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.dpil{padding:9px 4px;border-radius:8px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.dpil:hover{filter:brightness(1.3);transform:translateY(-1px)}
.dpil.sel{border-color:#fff!important;box-shadow:0 0 0 2px rgba(255,255,255,.2)}
.dp-pos{background:rgba(0,201,167,.18);color:#00c9a7}
.dp-rev{background:rgba(79,124,255,.18);color:#8faeff}
.dp-cau{background:rgba(255,183,77,.18);color:#ffb74d}
.dp-dng{background:rgba(255,79,109,.18);color:#ff4f6d}

/* ── DISTRICT DETAIL ── */
.ddcard{background:#181c28;border:1px solid #272d3d;border-radius:14px;padding:22px;margin-bottom:12px}
.ddhd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ddnm{font-size:18px;font-weight:800}
.ddsc{margin-left:auto;font-size:12px;color:#5a6078}
.ddrow{display:flex;gap:10px}
.ddm{flex:1;background:#1c2030;border-radius:10px;padding:15px;text-align:center}
.ddn{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px}
.ddl{font-size:11px;color:#5a6078;margin-bottom:4px}
.ddc{font-size:11px;color:#8b92a8}

/* ── MISC ── */
.note{background:rgba(79,124,255,.07);border:1px solid rgba(79,124,255,.2);border-radius:9px;padding:10px 16px;font-size:12px;color:#8faeff;margin-bottom:12px}
.vleg{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#8b92a8}
.vli{display:flex;align-items:center;gap:5px}
.vld{width:9px;height:9px;border-radius:2px}
.chart-leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#8b92a8}
.cl-line{width:22px;height:2.5px;border-radius:2px}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .g2,.g3{grid-template-columns:1fr}
  .vrow{flex-direction:column}
  .vstats{flex-direction:row}
  .dgrid{grid-template-columns:repeat(4,1fr)}
  .t5row{flex-wrap:wrap}
  .rcont{padding:18px 16px 60px}
  .rhero{padding:22px 18px 18px}
  .rnav{padding:0 16px}
}
</style>
</head>

// ══ SVG CHARTS ══════════════════════════════════════
function trendSVG(t) {
  const all = [...t.open, ...t.close, ...t.net];
  const mn = Math.min(...all) - 2, mx = Math.max(...all) + 2;
  const x0=34,xe=290,y0=5,ye=108,n=t.yrs.length;
  const xs = t.yrs.map((_,i) => x0 + i/(n-1)*(xe-x0));
  const ty = v => y0 + (1-(v-mn)/(mx-mn))*(ye-y0);
  const line = (vals,col,dash='') => {
    const pts = vals.map((v,i) => `${xs[i].toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-dasharray="${dash}" stroke-linecap="round" stroke-linejoin="round"/>`;
  };
  const dots = (vals,col) => vals.map((v,i) =>
    `<circle cx="${xs[i].toFixed(1)}" cy="${ty(v).toFixed(1)}" r="3" fill="${col}"/>`
  ).join('');
  const grid = [];
  for (let i=0;i<=3;i++) {
    const v = mn+(mx-mn)*i/3, y = ty(v);
    grid.push(`<line x1="${x0}" y1="${y.toFixed(1)}" x2="${xe}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,.05)"/>`);
    grid.push(`<text x="${x0-4}" y="${(y+3).toFixed(1)}" font-size="9" fill="#5a6078" text-anchor="end">${v.toFixed(0)}%</text>`);
  }
  const xl = t.yrs.map((yr,i) =>
    `<text x="${xs[i].toFixed(1)}" y="${(ye+13).toFixed(1)}" font-size="9" fill="#5a6078" text-anchor="middle">${yr}</text>`
  ).join('');
  return `<svg viewBox="0 0 300 ${ye+18}" width="100%" style="display:block">
    ${grid.join('')}
    ${line(t.open,'#4f7cff')}${line(t.close,'#ff4f6d')}${line(t.net,'#00c9a7','5,3')}
    ${dots(t.open,'#4f7cff')}${dots(t.close,'#ff4f6d')}${dots(t.net,'#00c9a7')}
    ${xl}</svg>`;
}

function storeBars(stores, yrs) {
  const mx = Math.max(...stores);
  return `<div style="display:flex;gap:7px;align-items:flex-end;height:100px;padding:0 2px">
    ${stores.map((v,i) => {
      const h = Math.round(v/mx*78);
      const col = i>0 && v<stores[i-1] ? 'rgba(255,79,109,.65)' : 'rgba(79,124,255,.65)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="font-size:9px;color:#5a6078">${(v/1000).toFixed(1)}k</div>
        <div style="width:100%;height:${h}px;background:${col};border-radius:3px 3px 0 0"></div>
        <div style="font-size:9px;color:#5a6078">${yrs[i]}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function seasonBars(ss) {
  const mx = Math.max(...ss.flatMap(s=>[s.o,s.c]));
  return `<div style="display:flex;gap:16px;align-items:flex-end;height:85px;padding:0 4px">
    ${ss.map(s => {
      const ho = Math.round(s.o/mx*68), hc = Math.round(s.c/mx*68);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:100%;display:flex;gap:3px;align-items:flex-end;height:72px">
          <div style="flex:1;height:${ho}px;background:rgba(79,124,255,.7);border-radius:3px 3px 0 0" title="개업 ${s.o}%"></div>
          <div style="flex:1;height:${hc}px;background:rgba(255,79,109,.6);border-radius:3px 3px 0 0" title="폐업 ${s.c}%"></div>
        </div>
        <div style="font-size:10px;color:#5a6078">${s.q}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function lcSVG(lc, pos) {
  const cls  = {성장기:'lcg',성숙기:'lcm',쇠퇴기:'lcd'}[lc]||'lcg';
  const note = {성장기:'진입 적기 — 시장이 꾸준히 확장 중',성숙기:'진입 신중 — 차별화 전략 필수',쇠퇴기:'진입 비추 — 시장이 수축 중'}[lc];
  const dotC = {성장기:'#00c9a7',성숙기:'#ffb74d',쇠퇴기:'#ff4f6d'}[lc];
  const p    = pos*100;
  const x    = 10 + pos*182;
  const y    = p<25 ? 68-p*2.3 : p<55 ? 11+(p-25)*.13 : 15+(p-55)*1.1;
  return `<span class="lcstg ${cls}">${lc}</span>
    <svg viewBox="0 0 210 88" width="100%" style="display:block;margin-bottom:6px">
      <path d="M10,70 C30,70 50,8 100,8 C145,8 162,44 200,64"

}

    <div class="interp">종합 점수는 개업율·폐업율·순증가율을 가중 합산한 값입니다. <b>상위 지역일수록</b> 이 업종의 생존 확률이 통계적으로 높습니다. 카드를 클릭하면 상세 데이터를 확인할 수 있습니다.</div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div class="ctitle">B1. 자치구별 창업 판정</div>
        <div class="csub" style="margin:3px 0 0">서울 25개 자치구 — 클릭하면 상세 분석 표시</div>
      </div>
      <div class="vleg">
        <span class="vli"><span class="vld" style="background:#00c9a7"></span>진입 긍정</span>
        <span class="vli"><span class="vld" style="background:#8faeff"></span>진입 검토</span>
        <span class="vli"><span class="vld" style="background:#ffb74d"></span>진입 신중</span>
        <span class="vli"><span class="vld" style="background:#ff4f6d"></span>진입 위험</span>
      </div>
    </div>
    <div class="dgrid" id="dgrid"></div>
    <div class="interp" style="margin-top:13px">판정은 해당 구의 이 업종 개업율·폐업율·순증가율을 서울 평균과 비교해 산출합니다. <b>초록(긍정) 지역</b>이 통계적으로 생존율이 높은 창업 입지입니다.</div>
  </div>

  <div id="ddarea"></div>
  `;
}

// ══ DISTRICT ════════════════════════════════════════
function renderDGrid() {
  document.getElementById('dgrid').innerHTML = GUS.map(g => {
    const d = GUB[g];
    return `<div class="dpil ${d.v}${selDist===g?' sel':''}"
      onclick="clickDist('${g}')" title="${g} 종합 ${d.s}점">
      ${g.replace('구','')}
    </div>`;
  }).join('');
}

function clickDist(gu) {
  selDist = gu;
  renderDGrid();
  const d  = GUB[gu];
  const nc = d.net>=0 ? '#00c9a7' : '#ff4f6d';
  const vt = DCVT[d.v];
  const comments = {
    vp:`✅ <b style="color:#e8eaf0">${gu}</b>는 이 업종 창업에 유리한 지역입니다. 개업율(${d.open}%)이 높고 폐업율(${d.close}%)이 낮아 신규 점포가 꾸준히 증가하는 성장 시장입니다.`,
    vr:`🔍 <b style="color:#e8eaf0">${gu}</b>는 조건부 진입 가능 지역입니다. 개폐업율이 비슷한 수준으로 뚜렷한 차별화 포인트가 있다면 생존 가능성이 있습니다.`,
    vc:`⚠️ <b style="color:#e8eaf0">${gu}</b>는 진입에 신중해야 합니다. 폐업율(${d.close}%)이 개업율(${d.open}%)을 초과하며 이미 경쟁이 포화 상태입니다.`,
    vd:`🚫 <b style="color:#e8eaf0">${gu}</b>는 이 업종 창업을 권장하지 않습니다. 폐업율(${d.close}%)이 극도로 높아 생존 확률이 낮고, 순증가율 ${d.net}%로 시장이 빠르게 축소 중입니다.`,
  }[vt];
  const ddiv = document.getElementById('ddarea');
  ddiv.innerHTML = `
    <div class="ddcard">
      <div class="ddhd">
        <div class="ddnm">${gu} 상세 분석</div>
        <span class="chip ${DCVL[d.v]}">${VL[vt]}</span>
        <span class="ddsc">종합점수 ${d.s}점</span>
      </div>
      <div class="ddrow">
        <div class="ddm">
          <div class="ddn" style="color:#4f7cff">${d.open}%</div>
          <div class="ddl">개업율</div>
          <div class="ddc">서울 평균 대비 ${d.open>=15.5?'▲ 높음':'▼ 낮음'}</div>
        </div>
        <div class="ddm">
          <div class="ddn" style="color:#ff4f6d">${d.close}%</div>
          <div class="ddl">폐업율</div>
          <div class="ddc">서울 평균 대비 ${d.close>=15.5?'▲ 높음':'▼ 낮음'}</div>
        </div>
        <div class="ddm">
          <div class="ddn" style="color:${nc}">${d.net>0?'+':''}${d.net}%</div>
          <div class="ddl">순증가율</div>
          <div class="ddc">현재 점포수 ${d.st}개</div>
        </div>
      </div>
      <div class="interp" style="margin-top:13px">${comments}</div>
    </div>`;
  ddiv.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ══ VIEW CONTROL ════════════════════════════════════
function showResults(k) {
  cur = k; selDist = null;
  const d = DATA[k];
  document.getElementById('vL').style.display = 'none';
  document.getElementById('vR').style.display = 'block';
  document.getElementById('rnind').textContent = d.label;
  document.getElementById('rhero').innerHTML = `
    <div class="rhtag">창업 리포트</div>
    <div class="rhtitle">서울 <span class="hl">·</span> ${d.label}<br>동향 및 상세 리포트</div>
    <div class="rhsub">서울 열린데이터 기반 · 2020–2024년 분기 통계 · 샘플 데이터</div>
    <span class="rhbadge ${d.rb}">${d.verdictText}</span>`;
  document.getElementById('rcont').innerHTML = buildContent(d);
  renderDGrid();
  window.scrollTo({top:0, behavior:'auto'});
}

function back() {
  document.getElementById('vR').style.display = 'none';
  document.getElementById('vL').style.display = 'flex';
  cur = null; selDist = null;
}

function go() {
  const k = document.getElementById('sel').value;
  if (!k) return;
  showResults(k);
}

function qgo(k) {
  document.getElementById('sel').value = k;
  showResults(k);
}
</script>
</body>
</html>
